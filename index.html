
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Para ti 💖</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink-50: #fff5f9;
      --pink-100: #ffe6f2;
      --pink-200: #ffcce6;
      --pink-300: #ffb3d9;
      --pink-400: #ff80bf;
      --pink-500: #ff4da6;
      --pink-600: #e04f8a;
      --text-dark: #7a3062;
      --glass: rgba(255, 255, 255, 0.7);
      --shadow: 0 8px 24px rgba(224, 79, 138, 0.2);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, var(--pink-100), var(--pink-200));
      height: 100vh; width: 100vw;
      overflow: hidden;
      color: var(--text-dark);
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
    }

    /* SISTEMA DE PANTALLAS */
    .screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      opacity: 0; visibility: hidden; pointer-events: none;
      transition: opacity 0.4s ease, visibility 0.4s;
      display: flex; flex-direction: column; align-items: center;
      overflow-y: auto; overflow-x: hidden;
    }
    .screen.active { opacity: 1; visibility: visible; pointer-events: auto; }

    /* PANTALLA PRINCIPAL */
    #main-screen {
      background: linear-gradient(135deg, var(--pink-50), var(--pink-200));
      z-index: 10; padding: 1.5rem 1rem;
      justify-content: flex-start;
      padding-bottom: calc(5rem + var(--safe-bottom));
    }
    .messages-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1rem; width: 100%; max-width: 900px; margin-bottom: 1.5rem;
    }
    .msg-card {
      background: var(--glass); backdrop-filter: blur(8px); padding: 1.2rem;
      border-radius: 16px; box-shadow: var(--shadow); text-align: center;
      cursor: text; transition: all 0.25s; min-height: 80px;
      display: flex; align-items: center; justify-content: center;
    }
    .msg-card:hover { transform: translateY(-3px) rotate(-1deg); box-shadow: 0 10px 25px rgba(224,79,138,0.25); }
    .msg-card:focus { outline: 2px dashed var(--pink-400); background: #fff9fd; }
    .msg-card p { font-family: 'Quicksand', sans-serif; font-size: 1.1rem; font-weight: 600; line-height: 1.5; }

    .main-buttons {
      display: flex; gap: 0.8rem; flex-wrap: wrap; justify-content: center;
      width: 100%; max-width: 400px; margin-bottom: 1rem;
    }
    .btn {
      border: none; padding: 0.9rem 1.5rem; font-size: 1.05rem; font-weight: 700;
      border-radius: 50px; cursor: pointer; transition: all 0.2s cubic-bezier(0.175,0.885,0.32,1.275);
      box-shadow: 0 6px 15px rgba(0,0,0,0.12); flex: 1; min-width: 140px;
    }
    #hug-btn { background: linear-gradient(45deg, var(--pink-400), var(--pink-600)); color: white; }
    #notes-btn { background: white; color: var(--pink-600); border: 2px solid var(--pink-300); }
    .btn:active { transform: scale(0.96); }

    /* MUSICA */
    #music-bar {
      position: fixed; bottom: calc(1rem + var(--safe-bottom)); left: 50%; transform: translateX(-50%);
      background: var(--glass); padding: 0.6rem 1.2rem; border-radius: 20px;
      display: flex; align-items: center; gap: 0.6rem; box-shadow: var(--shadow);
      font-size: 0.85rem; z-index: 20; white-space: nowrap;
      max-width: 95vw;
    }
    #music-bar input { display: none; }
    .music-btn {
      background: var(--pink-200); color: var(--pink-600); border: none;
      padding: 0.4rem 0.8rem; border-radius: 10px; cursor: pointer; font-weight: 600;
      transition: 0.2s; flex-shrink: 0;
    }
    #music-name { color: #b36b99; font-size: 0.8rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 150px; }

    /* PANTALLA NOTAS */
    #notes-screen { background: radial-gradient(circle at 30% 30%, var(--pink-100), var(--pink-200)); z-index: 30; }
    .falling-flowers { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; }
    .flower {
      position: absolute; top: -50px; font-size: 1.8rem;
      animation: flowerFall linear forwards; opacity: 0.75;
    }
    @keyframes flowerFall {
      0% { transform: translateY(0) rotate(0deg); opacity: 0; }
      10% { opacity: 0.85; }
      90% { opacity: 0.85; }
      100% { transform: translateY(110vh) rotate(25deg); opacity: 0; }
    }

    .notes-canvas {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      padding-top: calc(45px + var(--safe-top));
      padding-bottom: calc(60px + var(--safe-bottom));
    }
    .sticky-note {
      position: absolute; width: 160px; min-height: 120px;
      background: linear-gradient(135deg, #fff9fb, #ffe6f2);
      border: 2px solid #ffcce6; border-radius: 12px; padding: 10px;
      box-shadow: 0 6px 18px rgba(200, 80, 140, 0.25);
      font-size: 0.9rem; line-height: 1.4; cursor: grab; user-select: none;
      transition: box-shadow 0.2s;
    }
    .sticky-note.dragging { cursor: grabbing; box-shadow: 0 15px 35px rgba(0,0,0,0.2); z-index: 999; transform: rotate(-1deg); }
    .sticky-note textarea {
      width: 100%; height: 85px; background: transparent; border: none;
      resize: none; font-family: 'Nunito', sans-serif; font-size: 0.95rem;
      color: var(--text-dark); outline: none;
    }
    .note-delete {
      position: absolute; top: -6px; right: -6px; width: 20px; height: 20px;
      background: #ff6b9d; color: white; border-radius: 50%; display: flex;
      align-items: center; justify-content: center; cursor: pointer;
      font-size: 0.75rem; font-weight: bold; box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    .fab-add {
      position: fixed; bottom: calc(1.5rem + var(--safe-bottom)); right: 1.5rem;
      width: 50px; height: 50px; background: var(--pink-500); color: white;
      border: none; border-radius: 50%; font-size: 1.8rem; cursor: pointer;
      box-shadow: 0 8px 20px rgba(255,77,166,0.4); z-index: 40;
      transition: transform 0.3s, background 0.2s;
    }
    .fab-add:hover { transform: scale(1.1) rotate(90deg); background: var(--pink-600); }

    /* PANTALLA ABRAZO */
    #hug-screen {
      background: radial-gradient(circle at 50% 50%, var(--pink-200), var(--pink-400));
      z-index: 50; clip-path: circle(0% at 50% 50%);
      transition: clip-path 0.8s cubic-bezier(0.4,0,0.2,1);
    }
    #hug-screen.active { clip-path: circle(150% at 50% 50%); }
    .falling-phrases { position: absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; overflow:hidden; }
    .phrase-drop {
      position: absolute; font-family: 'Quicksand', sans-serif;
      font-size: 1.1rem; font-weight: 700; color: white;
      text-shadow: 0 2px 6px rgba(140,40,90,0.35); white-space: nowrap;
      animation: phraseFall linear forwards;
    }
    @keyframes phraseFall {
      0% { transform: translateY(-40px); opacity: 0; }
      10% { opacity: 0.9; }
      90% { opacity: 0.9; }
      100% { transform: translateY(105vh); opacity: 0; }
    }

    /* BOTONES DE VOLVER (FIJOS Y SEGUROS) */
    .back-btn {
      position: fixed; top: calc(1rem + var(--safe-top)); left: 1rem;
      background: white; color: var(--pink-600); border: 2px solid var(--pink-300);
      padding: 0.6rem 1.2rem; border-radius: 20px; font-weight: 700;
      cursor: pointer; z-index: 100; box-shadow: var(--shadow);
    }
    .back-btn:hover { transform: translateX(-3px); background: #fff8fb; }
    
    #back-hug {
      position: fixed; bottom: calc(2rem + var(--safe-bottom)); left: 50%; transform: translateX(-50%);
      background: white; color: var(--pink-600); border: none;
      padding: 0.9rem 2rem; font-size: 1rem; font-weight: 700;
      border-radius: 30px; cursor: pointer; z-index: 100;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15); width: 85%; max-width: 300px; text-align: center;
    }
    #back-hug:active { transform: translateX(-50%) scale(0.97); }

    /* RESPONSIVE MÓVIL */
    @media (max-width: 768px) {
      .messages-grid { grid-template-columns: 1fr; gap: 0.8rem; margin-bottom: 1rem; }
      .msg-card { padding: 1rem; min-height: 70px; }
      .msg-card p { font-size: 1rem; }
      .main-buttons { flex-direction: column; width: 100%; max-width: 90%; margin: 0 auto 1rem; }
      .btn { width: 100%; min-width: unset; padding: 0.95rem; font-size: 1.05rem; }
      #main-screen { padding-top: 1rem; padding-bottom: calc(5.5rem + var(--safe-bottom)); }
      .sticky-note { width: 140px; min-height: 110px; font-size: 0.85rem; }
      .sticky-note textarea { height: 75px; font-size: 0.9rem; }
      .fab-add { width: 46px; height: 46px; font-size: 1.6rem; right: 1rem; }
      #music-bar { padding: 0.5rem 1rem; font-size: 0.8rem; }
      #music-name { max-width: 120px; }
    }

    @media (max-width: 380px) {
      .msg-card p { font-size: 0.95rem; }
      .btn { padding: 0.85rem; font-size: 0.95rem; }
      .sticky-note { width: 125px; min-height: 100px; }
    }
  </style>
</head>
<body>

  <!-- PANTALLA PRINCIPAL -->
  <div id="main-screen" class="screen active">
    <div class="messages-grid">
      <div class="msg-card" contenteditable="true"><p>✨ Hoy es un nuevo día para respirar profundo</p></div>
      <div class="msg-card" contenteditable="true"><p>💖 Eres más fuerte de lo que tu mente te dice</p></div>
      <div class="msg-card" contenteditable="true"><p>🌸 Tu presencia alegra el mundo sin que lo notes</p></div>
      <div class="msg-card" contenteditable="true"><p>🕊️ Está bien no estar bien, pero no estás sola</p></div>
      <div class="msg-card" contenteditable="true"><p>🌷 Mereces paz, amor y días tranquilos</p></div>
      <div class="msg-card" contenteditable="true"><p>🌙 Tu luz brilla incluso en los días nublados</p></div>
    </div>

    <div class="main-buttons">
      <button id="hug-btn" class="btn">🤗 Abrazo Virtual</button>
      <button id="notes-btn" class="btn">📝 Muro de Notas</button>
    </div>

    <div id="music-bar">
      <span>🎵</span>
      <label class="music-btn" for="music-input">Elegir música</label>
      <input type="file" id="music-input" accept="audio/*">
      <span id="music-name">Sin música</span>
      <audio id="bg-music" loop></audio>
    </div>
  </div>

  <!-- PANTALLA NOTAS -->
  <div id="notes-screen" class="screen">
    <div class="falling-flowers" id="flowers-container"></div>
    <button id="back-notes" class="back-btn">← Volver</button>
    <div class="notes-canvas" id="notes-canvas"></div>
    <button id="add-note-fab" class="fab-add">+</button>
  </div>

  <!-- PANTALLA ABRAZO -->
  <div id="hug-screen" class="screen">
    <div class="falling-phrases" id="phrases-container"></div>
    <button id="back-hug">← Volver a la calma</button>
  </div>

  <script>
    // ELEMENTOS
    const mainScreen = document.getElementById('main-screen');
    const notesScreen = document.getElementById('notes-screen');
    const hugScreen = document.getElementById('hug-screen');
    const notesBtn = document.getElementById('notes-btn');
    const hugBtn = document.getElementById('hug-btn');
    const backNotesBtn = document.getElementById('back-notes');
    const backHugBtn = document.getElementById('back-hug');
    const addNoteFab = document.getElementById('add-note-fab');
    const notesCanvas = document.getElementById('notes-canvas');
    const flowersContainer = document.getElementById('flowers-container');
    const phrasesContainer = document.getElementById('phrases-container');
    const musicInput = document.getElementById('music-input');
    const bgMusic = document.getElementById('bg-music');
    const musicName = document.getElementById('music-name');

    // TRANSICIONES
    function showScreen(screen) { screen.classList.add('active'); }
    function hideScreen(screen) { screen.classList.remove('active'); }

    // MUSICA
    musicInput.addEventListener('change', e => {
      if(e.target.files[0]) {
        bgMusic.src = URL.createObjectURL(e.target.files[0]);
        musicName.textContent = e.target.files[0].name.replace(/\.[^/.]+$/, "").substring(0, 18) + (e.target.files[0].name.length > 20 ? '...' : '');
      }
    });
    document.getElementById('music-bar').addEventListener('click', e => {
      if(!bgMusic.src || !bgMusic.src.startsWith('blob:')) return;
      if(bgMusic.paused) bgMusic.play().catch(()=>{}); else bgMusic.pause();
      document.querySelector('.music-btn').textContent = bgMusic.paused ? '▶ Reproducir' : '⏸ Pausar';
    });

    // FLORES CAYENDO
    const flowers = ['🌸','🌺','🌷','🌼','💮','🪷','🌻','🌹','🍃','✨','🤍','🕊️','🌿'];
    let flowerInterval;
    function startFlowers() {
      flowersContainer.innerHTML = '';
      function spawn() {
        const el = document.createElement('div');
        el.className = 'flower';
        el.textContent = flowers[Math.floor(Math.random()*flowers.length)];
        el.style.left = Math.random()*90 + '%';
        el.style.animationDuration = (Math.random()*4 + 8) + 's';
        el.style.fontSize = (Math.random()*1 + 1.5) + 'rem';
        flowersContainer.appendChild(el);
        setTimeout(() => el.remove(), 13000);
      }
      for(let i=0; i<6; i++) setTimeout(spawn, i*250);
      flowerInterval = setInterval(spawn, 450);
    }
    function stopFlowers() { clearInterval(flowerInterval); setTimeout(() => flowersContainer.innerHTML='', 1000); }

    // FRASES CAYENDO
    const phrases = [
      "Tu sonrisa ilumina días enteros ☀️", "Respira profundo, todo estará bien 🌬️",
      "Eres más fuerte de lo que crees 💪", "Un abrazo virtual lleno de cariño 🤗",
      "No estás sola, estoy contigo 💖", "Los días difíciles también pasan 🌧️🌈",
      "Tu corazón merece paz y calma 🕊️", "Confía en tu proceso, florecerás 🌸",
      "Hoy descansa, mañana es otro día 🌙", "Eres digna de todo lo bonito ✨",
      "Tu luz brilla incluso en la oscuridad 🕯️", "Permítete sentir, está bien 🤍",
      "El mundo es mejor contigo en él 🌍💕", "Cuenta hasta 10 y suelta lo que duele 🍃",
      "Eres amor en forma de persona 💗", "Pequeños pasos también son avances 👣",
      "Tu valentía me inspira cada día 🌟", "Mereces días tranquilos y felices ☕",
      "Abrazo este mensaje y lo hago realidad 🫂", "La tormenta siempre termina, lo prometo ⛈️➡️🌤️",
      "Eres un regalo para quienes te rodean 🎁", "Sé amable contigo misma hoy 🌷",
      "Tu energía bonita no se apaga 🔋✨", "Estoy orgullosa de ti, siempre 🥺💕",
      "Hoy te mando todo mi cariño 💌", "Eres magia pura, nunca lo olvides 🌟"
    ];
    let phraseInterval;
    function startPhrases() {
      phrasesContainer.innerHTML = '';
      function spawn() {
        const el = document.createElement('div');
        el.className = 'phrase-drop';
        el.textContent = phrases[Math.floor(Math.random()*phrases.length)];
        el.style.left = Math.random()*80 + '%';
        el.style.animationDuration = (Math.random()*3 + 6) + 's';
        el.style.fontSize = (Math.random()*0.4 + 0.9) + 'rem';
        phrasesContainer.appendChild(el);
        setTimeout(() => el.remove(), 10000);
      }
      for(let i=0; i<5; i++) setTimeout(spawn, i*200);
      phraseInterval = setInterval(spawn, 400);
    }
    function stopPhrases() { clearInterval(phraseInterval); setTimeout(() => phrasesContainer.innerHTML='', 1000); }

    // NOTAS
    let notes = JSON.parse(localStorage.getItem('loveNotes') || '[]');
    let noteIdCounter = notes.length ? Math.max(...notes.map(n=>n.id)) + 1 : Date.now();

    function renderNotes() {
      notesCanvas.innerHTML = '';
      notes.forEach(n => createNoteEl(n));
    }

    function createNoteEl(note) {
      const el = document.createElement('div');
      el.className = 'sticky-note';
      el.id = `note-${note.id}`;
      el.style.left = `${Math.max(5, Math.min(90, note.x))}%`;
      el.style.top = `${Math.max(10, Math.min(90, note.y))}%`;
      el.innerHTML = `<div class="note-delete">×</div><textarea placeholder="Escribe aquí...">${note.text}</textarea>`;
      notesCanvas.appendChild(el);

      let isDrag = false, offX=0, offY=0;
      el.addEventListener('pointerdown', e => {
        if(e.target.tagName === 'TEXTAREA' || e.target.classList.contains('note-delete')) return;
        isDrag = true; el.classList.add('dragging');
        const rect = el.getBoundingClientRect();
        offX = e.clientX - rect.left; offY = e.clientY - rect.top;
        el.setPointerCapture(e.pointerId);
      });
      el.addEventListener('pointermove', e => {
        if(!isDrag) return;
        const nx = (e.clientX - offX) / window.innerWidth * 100;
        const ny = (e.clientY - offY) / window.innerHeight * 100;
        el.style.left = `${Math.max(5, Math.min(90, nx))}%`;
        el.style.top = `${Math.max(10, Math.min(90, ny))}%`;
      });
      el.addEventListener('pointerup', () => { if(isDrag) { isDrag = false; el.classList.remove('dragging'); saveNotes(); }});

      el.querySelector('.note-delete').addEventListener('click', e => {
        e.stopPropagation();
        if(confirm('¿Eliminar esta nota?')) {
          el.style.transform = 'scale(0.8)'; el.style.opacity = '0';
          setTimeout(() => { notes = notes.filter(n => n.id !== note.id); saveNotes(); renderNotes(); }, 200);
        }
      });

      el.querySelector('textarea').addEventListener('input', e => {
        const n = notes.find(n => n.id === note.id);
        if(n) n.text = e.target.value;
        clearTimeout(n._saveT); n._saveT = setTimeout(saveNotes, 600);
      });
    }

    function saveNotes() { localStorage.setItem('loveNotes', JSON.stringify(notes)); }
    function addNote() {
      const id = noteIdCounter++;
      const newNote = { id, x: 15 + Math.random()*65, y: 15 + Math.random()*55, text: '' };
      notes.push(newNote); saveNotes(); createNoteEl(newNote);
      setTimeout(() => document.querySelector(`#note-${id} textarea`).focus(), 100);
    }
    addNoteFab.addEventListener('click', addNote);

    // NAVEGACIÓN
    notesBtn.addEventListener('click', () => { renderNotes(); hideScreen(mainScreen); showScreen(notesScreen); startFlowers(); });
    backNotesBtn.addEventListener('click', () => { stopFlowers(); hideScreen(notesScreen); showScreen(mainScreen); });
    
    hugBtn.addEventListener('click', () => { hideScreen(mainScreen); showScreen(hugScreen); startPhrases(); if(bgMusic.src && bgMusic.paused) bgMusic.play().catch(()=>{}); });
    backHugBtn.addEventListener('click', () => { stopPhrases(); bgMusic.pause(); hideScreen(hugScreen); showScreen(mainScreen); });

    // INICIALIZAR
    document.addEventListener('DOMContentLoaded', () => { showScreen(mainScreen); });
  </script>
</body>
</html>
